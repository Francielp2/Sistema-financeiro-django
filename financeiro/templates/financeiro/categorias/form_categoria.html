{% extends 'base.html' %}

{% block title %}
Nova Categoria
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card bg-dark border-secondary shadow">

            <div class="card-body">

                <h2 class="text-success mb-4">
                    Nova Categoria
                </h2>

                <form method="POST">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label class="form-label text-light">
                            Nome
                        </label>

                        {{ form.nome }}

                    </div>

                    <div class="mb-3">

                        <label class="form-label text-light">
                            Descrição
                        </label>

                        {{ form.descricao }}

                    </div>

                    <div class="form-check mb-4">

                        {{ form.ativa }}

                        <label class="form-check-label text-light">
                            Categoria ativa
                        </label>

                    </div>

                    <button type="submit" class="btn btn-success w-100">
                        Salvar Categoria
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
