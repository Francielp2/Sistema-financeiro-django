{% extends 'base.html' %}

{% block title %}
Excluir Conta
{% endblock %}

{% block content %}

<div class="app-form-page app-form-page-narrow">
    <div class="page-heading">
        <h3 class="text-danger">Excluir Conta</h3>
        <p class="text-muted">
            Confirme a exclusão antes de continuar.
        </p>
    </div>

    <form method="POST" class="card app-form-card">
        {% csrf_token %}

        <div class="card-body">
            <section class="app-form-section">
                <div class="app-form-section-title">Confirmação</div>
                <p class="app-form-confirmation-text mb-0">
                    Tem certeza que deseja excluir a conta
                    <strong>{{ conta.nome }}</strong>?
                </p>
            </section>

            <div class="app-form-actions">
                <button type="submit" class="btn btn-danger">
                    Sim, excluir
                </button>
                <a href="{% url 'listar_contas' %}" class="btn btn-outline-primary">
                    Cancelar
                </a>
            </div>
        </div>
    </form>
</div>

{% endblock %}
