{% extends 'base.html' %}

{% block title %}
Criar Conta
{% endblock %}

{% block content %}

{# FORMULÁRIO DE CRIAÇÃO E EDIÇÃO DE CONTA #}
<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card bg-dark border-secondary shadow">

            <div class="card-body">

                <h2 class="mb-4 text-success">
                     Nova Conta
                </h2>

                <form method="POST">

                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label text-light">
                            Nome
                        </label>

                        {{ form.nome }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-light">
                            Tipo
                        </label>

                        {{ form.tipo }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-light">
                            Saldo Inicial
                        </label>

                        {{ form.saldo_inicial }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-light">
                            Descrição
                        </label>

                        {{ form.descricao }}
                    </div>

                   <div class="form-check mb-4">
                        {{ form.ativa }}

                        <label class="form-check-label">
                            Conta ativa
                        </label>
                    </div>
                    
                    <button type="submit" class="btn btn-success w-100">
                        Salvar Conta
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
