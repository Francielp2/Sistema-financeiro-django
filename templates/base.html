{% load static %}

<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        {% block title %}
        Sistema Financeiro
        {% endblock %}
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary mb-4">

        <div class="container-fluid">

            <a class="navbar-brand text-success fw-bold" href="{% url 'inicio' %}">
                Financeiro
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="navbarNav">

                <ul class="navbar-nav me-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'inicio' %}">
                            Início
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'listar_contas' %}">
                            Contas
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'listar_categorias' %}">
                            Categorias
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'listar_movimentacoes' %}">
                            Movimentações
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'resumo_financeiro' %}">
                            Resumo
                        </a>
                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <div class="container">

        {% block content %}
        {% endblock %}

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    {% block extra_js %}
    {% endblock %}

</body>

</html>
